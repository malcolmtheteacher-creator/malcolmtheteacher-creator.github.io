<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Scenario Practice | Malcolm Hyndman</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --off-white: #f8f7f4;
  --warm-gray: #e8e6e1;
  --mid-gray: #6b6b6b;
  --accent: #1e3a2f;
  --accent-light: #2c5530;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.6;
  font-size: 17px;
}

.lesson-header {
  color: white;
  padding: 40px 30px;
  text-align: center;
}

.lesson-meta {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.lesson-badge {
  font-size: 0.75rem;
  padding: 5px 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.lesson-header h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 10px;
  line-height: 1.3;
}

.lesson-subtitle {
  opacity: 0.9;
  font-size: 1rem;
  max-width: 600px;
  margin: 0 auto;
}

/* Tabs */
.tab-nav {
  display: flex;
  background: var(--off-white);
  border-bottom: 1px solid var(--warm-gray);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-btn {
  flex: 1;
  min-width: 100px;
  padding: 15px 20px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--mid-gray);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
}

.tab-btn:hover { color: var(--black); background: var(--warm-gray); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--white); }

.tab-content {
  display: none;
  padding: 40px 30px;
  max-width: 900px;
  margin: 0 auto;
  min-height: 500px;
}

.tab-content.active { display: block; }

.tab-content h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem;
  font-weight: 400;
  margin-bottom: 25px;
  color: var(--accent);
}

.tab-content h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 30px 0 15px;
}

.tab-content p { margin-bottom: 20px; line-height: 1.8; }

/* Framework */
.framework-box {
  background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 30px;
  margin: 30px 0;
}

.framework-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  color: var(--accent);
  margin-bottom: 20px;
  text-align: center;
}

.framework-steps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.framework-step {
  background: white;
  padding: 18px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.framework-step .letter {
  display: inline-block;
  width: 36px;
  height: 36px;
  background: var(--accent);
  color: white;
  border-radius: 50%;
  line-height: 36px;
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

.framework-step .word { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
.framework-step .desc { font-size: 0.8rem; color: var(--mid-gray); }

/* Phrase Bank */
.phrase-bank {
  background: var(--off-white);
  border-radius: 12px;
  padding: 25px;
  margin: 25px 0;
}

.phrase-bank h4 {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 15px;
}

.phrase-item {
  background: white;
  padding: 15px 20px;
  border-radius: 8px;
  margin-bottom: 10px;
  border-left: 4px solid var(--accent);
  cursor: pointer;
  transition: all 0.3s;
}

.phrase-item:hover { transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.phrase-text { font-weight: 500; margin-bottom: 5px; }
.phrase-context { font-size: 0.85rem; color: var(--mid-gray); display: none; }
.phrase-item.expanded .phrase-context { display: block; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--warm-gray); }

/* Comparison */
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
.comparison-card { padding: 25px; border-radius: 12px; }
.comparison-card.weak { background: #fef2f2; border: 2px solid #fecaca; }
.comparison-card.strong { background: #f0fdf4; border: 2px solid #bbf7d0; }
.comparison-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; }
.comparison-card.weak .comparison-label { color: #dc2626; }
.comparison-card.strong .comparison-label { color: #16a34a; }
.comparison-text { font-style: italic; line-height: 1.7; }

/* Scenario Box */
.scenario-box {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  padding: 30px;
  margin: 25px 0;
}

.scenario-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #2563eb; margin-bottom: 15px; }
.scenario-context { font-style: italic; color: var(--mid-gray); margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--warm-gray); }

/* Response Area */
.response-area { margin: 25px 0; }
.response-area textarea {
  width: 100%;
  min-height: 150px;
  padding: 20px;
  border: 2px solid var(--warm-gray);
  border-radius: 12px;
  font-family: inherit;
  font-size: 1rem;
  line-height: 1.6;
  resize: vertical;
  transition: border-color 0.3s;
}
.response-area textarea:focus { outline: none; border-color: var(--accent); }

/* Timer */
.timer-container { text-align: center; margin: 30px 0; }
.timer-display { font-size: 3rem; font-weight: 300; color: var(--accent); margin-bottom: 20px; }
.timer-display.warning { color: #f59e0b; }
.timer-display.danger { color: #dc2626; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.timer-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

.timer-btn, .action-btn {
  padding: 12px 25px;
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 8px;
}

.timer-btn:hover, .action-btn:hover { background: var(--accent); color: white; }
.timer-btn.active, .action-btn.primary { background: var(--accent); color: white; }
.action-btn { margin: 10px 5px 10px 0; }
.action-btn.secondary { background: transparent; color: var(--accent); }

/* Model Answer */
.model-answer {
  background: #f0fdf4;
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 25px;
  margin: 25px 0;
  display: none;
}
.model-answer.visible { display: block; }
.model-answer-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 15px; }
.model-answer-text { line-height: 1.8; font-style: italic; }

/* Summary */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; }
.summary-card { background: var(--off-white); padding: 25px; border-radius: 12px; text-align: center; }
.summary-card .icon { font-size: 2rem; margin-bottom: 10px; }
.summary-card h4 { font-size: 1rem; margin-bottom: 10px; }
.summary-card p { font-size: 0.9rem; color: var(--mid-gray); margin: 0; }

/* Nav */
.nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--warm-gray); }
.nav-btn { padding: 14px 30px; border: none; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; border-radius: 8px; }
.nav-btn.prev { background: var(--off-white); color: var(--black); }
.nav-btn.prev:hover { background: var(--warm-gray); }
.nav-btn.next { background: var(--accent); color: white; }
.nav-btn.next:hover { background: var(--accent-light); }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

blockquote { background: var(--off-white); border-left: 4px solid var(--accent); padding: 20px 25px; margin: 25px 0; font-style: italic; }
.highlight { background: linear-gradient(transparent 60%, #fef08a 60%); padding: 0 2px; }

/* Footer */
.lesson-footer { background: var(--black); color: white; padding: 40px 30px; text-align: center; }
.footer-cta { font-family: 'Instrument Serif', serif; font-size: 1.3rem; margin-bottom: 20px; }
.footer-btn { display: inline-block; background: white; color: var(--black); padding: 14px 35px; text-decoration: none; font-weight: 600; border-radius: 8px; transition: all 0.3s; }
.footer-btn:hover { background: var(--off-white); }
.footer-back { display: block; margin-top: 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }
.footer-back:hover { color: white; }

/* Not Found */
.not-found { max-width: 600px; margin: 80px auto; text-align: center; padding: 40px; }
.not-found h1 { font-family: 'Instrument Serif', serif; font-size: 2.5rem; margin-bottom: 20px; }
.not-found a { color: var(--accent); }

@media (max-width: 768px) {
  .lesson-header { padding: 30px 20px; }
  .lesson-header h1 { font-size: 1.6rem; }
  .tab-content { padding: 30px 20px; }
  .framework-steps { grid-template-columns: 1fr; }
  .comparison { grid-template-columns: 1fr; }
  .nav-buttons { flex-direction: column; gap: 10px; }
  .nav-btn { width: 100%; }
}
</style>
</head>

function lookupScenario(key) {
  const [subId, funcId] = key.split('-');
  const sectorLetter = subId.replace(/[0-9]/g,'');
  let sector, subsector;
  for (const s of sectors) {
    const found = s.subsectors.find(sub => sub.id === subId);
    if (found) { sector = s; subsector = found; break; }
  }
  const func = functions.find(f => f.id === parseInt(funcId));
  const scenario = scenarios[key];
  return { sector, subsector, func, scenario, sectorLetter };
}

// TAB & TIMER LOGIC
// ═══════════════════════════════════════════
function showTab(n) {
  document.querySelectorAll('.tab-content').forEach((t,i) => {
    t.classList.toggle('active', i===n);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', i===n);
  });
  window.scrollTo(0, 0);
}

let timerInterval, timerSeconds = 180;
function setTimer(s) { timerSeconds = s; document.getElementById('timer').textContent = formatTime(s); document.getElementById('timer').className = 'timer-display'; }
function startTimer() {
  clearInterval(timerInterval);
  let s = timerSeconds;
  timerInterval = setInterval(() => {
    s--;
    const el = document.getElementById('timer');
    el.textContent = formatTime(s);
    el.className = 'timer-display' + (s <= 30 ? ' danger' : s <= 60 ? ' warning' : '');
    if (s <= 0) clearInterval(timerInterval);
  }, 1000);
}
function resetTimer() { clearInterval(timerInterval); setTimer(timerSeconds); }
function formatTime(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
