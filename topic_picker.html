        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .header p { font-size: 1.1rem; opacity: 0.9; }

        /* Filter section */
        .filter-section {
            max-width: 1100px;
            margin: 24px auto 0;
            padding: 0 20px;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .filter-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 50px;
        }
        .filter-btn {
            padding: 7px 18px;
            border-radius: 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .filter-btn:hover { background: #f0edff; }
        .filter-btn.active { background: #667eea; color: white; }

        .filter-btn.lvl { border-color: #94a3b8; color: #64748b; font-size: 0.82rem; padding: 5px 14px; }
        .filter-btn.lvl:hover { background: #f1f5f9; }
        .filter-btn.lvl.active { background: #64748b; color: white; border-color: #64748b; }

        .search-box {
            flex: 1; min-width: 200px;
            padding: 9px 16px; border-radius: 20px;
            border: 2px solid #ddd; font-size: 0.9rem; outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: #667eea; }

        .lesson-count {
            max-width: 1100px; margin: 6px auto 0; padding: 0 20px;
            font-size: 0.82rem; color: #999;
        }

        /* Grid */
        .grid {
            max-width: 1100px;
            margin: 20px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 18px;
        }
        .category-label {
            grid-column: 1 / -1;
            font-size: 1.25rem; font-weight: 700; color: #444;
            margin-top: 10px; padding-bottom: 6px;
            border-bottom: 2px solid #667eea;
            display: flex; align-items: center; gap: 10px;
        }

        /* Cards */
        .card {
            background: white; border-radius: 14px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
            text-decoration: none; color: inherit; cursor: pointer;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.18);
        }

        .card-banner { height: 6px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-banner.b1 { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .card-banner.b2 { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); }
        .card-banner.c1 { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .card-banner.c2 { background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%); }

        .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }

        .card-level {
            display: inline-block; padding: 2px 8px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; width: fit-content; margin-bottom: 8px;
        }
        .card-level.a2 { background: #e8f5e9; color: #2e7d32; }
        .card-level.b1 { background: #e3f2fd; color: #1565c0; }
        .card-level.b2 { background: #fff3e0; color: #e65100; }
        .card-level.c1 { background: #fce4ec; color: #c62828; }
        .card-level.c2 { background: #f3e5f5; color: #6a1b9a; }

        .card-title-row {
            display: flex; align-items: center; flex-wrap: wrap;
            gap: 6px; margin-bottom: 8px;
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; color: #222;
        }

        /* CEFR grammar badge — subtle, matches speaking pathway */
        .cefr-badge {
            display: inline-block; padding: 2px 9px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 10px; font-size: 0.7rem; color: #059669;
            font-weight: 600; text-decoration: none; white-space: nowrap;
            transition: all 0.2s ease;
        }
        .cefr-badge:hover {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.2) 100%);
            border-color: rgba(16, 185, 129, 0.5); color: #047857; transform: scale(1.05);
        }

        /* Speaking pathway badge */
        .sp-badge {
            display: inline-block; padding: 2px 9px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.08) 0%, rgba(255, 107, 107, 0.08) 100%);
            border: 1px solid rgba(233, 69, 96, 0.25);
            border-radius: 10px; font-size: 0.7rem; color: #d63453;
            font-weight: 600; text-decoration: none; white-space: nowrap;
            transition: all 0.2s ease;
        }
        .sp-badge:hover {
            background: rgba(233, 69, 96, 0.15);
            border-color: rgba(233, 69, 96, 0.5); transform: scale(1.05);
        }

        .card-desc {
            font-size: 0.88rem; color: #666; line-height: 1.5; flex: 1;
        }
        .card-tags {
            display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px;
        }
        .tag {
            padding: 2px 9px; background: #f0f0ff; color: #667eea;
            border-radius: 8px; font-size: 0.72rem; font-weight: 600;
        }

        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #999;
        }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

        @media (max-width: 700px) {
            .header h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
        }
    </style>
</head>

let aT='all', aL='all', sT='';

function render() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    const f = L.filter(l => {
        const mt = aT==='all' || l.cat===aT;
        const ml = aL==='all' || l.lv===aL || (aL==='c1' && (l.lv==='b2'||l.lv==='c1'));
        const ms = !sT || l.t.toLowerCase().includes(sT) || l.d.toLowerCase().includes(sT)
            || l.g.toLowerCase().includes(sT) || l.tags.some(x=>x.toLowerCase().includes(sT));
        return mt && ml && ms;
    });
    document.getElementById('cnt').textContent = f.length===L.length ? L.length+' lessons available' : 'Showing '+f.length+' of '+L.length+' lessons';
    if(!f.length){ g.innerHTML='<div class="empty-state"><div class="emoji">🔍</div><p>No lessons match. Try different filters!</p></div>'; return; }
    const cats=[]; const seen=new Set();
    f.forEach(l=>{ if(!seen.has(l.cat)){ seen.add(l.cat); cats.push(l.cat); }});
    cats.forEach(c=>{
        const cl=f.filter(l=>l.cat===c);
        const first=L.find(l=>l.cat===c && l.ic);
        const lb=document.createElement('div'); lb.className='category-label';
        lb.innerHTML=`<span>${first?first.ic:''}</span> ${first?first.cl:c}`;
        g.appendChild(lb);
        cl.forEach(l=>{
            const d=document.createElement('a'); d.className='card'; d.href=l.f;
            let badges='';
            if(l.gl) badges+=`<a href="${l.gl}" class="cefr-badge" title="Study the grammar" onclick="event.stopPropagation()">${l.g}</a>`;
            if(l.sl) badges+=`<a href="${l.sl}" class="sp-badge" title="Speaking skills practice" onclick="event.stopPropagation()">Speaking</a>`;
            d.innerHTML=`<div class="card-banner ${l.lv}"></div><div class="card-body">
                <span class="card-level ${l.lv}">${l.lv.toUpperCase()}</span>
                <div class="card-title-row"><span class="card-title">${l.t}</span>${badges}</div>
                <div class="card-desc">${l.d}</div>
                <div class="card-tags">${l.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
            </div>`;
            g.appendChild(d);
        });
    });
}

function ft(c){
    aT=c;
    document.querySelectorAll('.filter-btn:not(.lvl)').forEach(b=>{
        const txt=b.textContent.trim();
        b.classList.toggle('active',
            (c==='all'&&txt==='All Topics')||(c==='food'&&txt.includes('Food'))||(c==='travel'&&txt.includes('Travel'))
            ||(c==='life'&&txt.includes('Daily'))||(c==='entertainment'&&txt.includes('Entertainment'))
            ||(c==='work'&&txt.includes('Work'))||(c==='health'&&txt.includes('Health'))
            ||(c==='people'&&txt==='People')||(c==='world'&&txt.includes('Big'))
        );
    }); render();
}
function fl(v){
    aL=v;
    document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===v||(v==='all'&&b.textContent.trim()==='All')||(v==='c1'&&b.textContent.trim()==='B2–C1')));
    render();
}
function ss(v){ sT=v.toLowerCase().trim(); render(); }
render();
